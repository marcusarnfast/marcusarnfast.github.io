<!doctype html>
<html>
  <head>
    <title>My Data Viz Site</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="min-h-screen bg-gray-100">
    <main class="max-w-7xl mx-auto p-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div
          class="col-span-1 flex flex-col gap-4 border border-gray-200 rounded-2xl p-4 bg-white"
        >
          <h1 class="text-2xl font-bold">Prostitution Heatmap</h1>
          <a
            href="prostitution_heatmap.html"
            class="py-2 px-4 bg-blue-500 flex w-fit text-white rounded-md hover:bg-blue-600 transition-colors"
          >
            <p class="text-white">Open full →</p>
          </a>
          <iframe
            src="prostitution_heatmap.html"
            width="100%"
            height="600"
            frameborder="0"
          ></iframe>
        </div>

        <div
          class="col-span-1 flex flex-col gap-4 border border-gray-200 rounded-2xl p-4 bg-white"
        >
          <h1 class="text-2xl font-bold">Vehicle Theft</h1>
          <a
            href="vehicle_thefts.html"
            class="py-2 px-4 bg-blue-500 flex w-fit text-white rounded-md hover:bg-blue-600 transition-colors"
          >
            <p class="text-white">Open full →</p>
          </a>
          <iframe
            src="vehicle_thefts.html"
            width="100%"
            height="600"
            frameborder="0"
          ></iframe>
        </div>

        <div
          class="col-span-1 flex flex-col gap-4 border border-gray-200 rounded-2xl p-4 bg-white"
        >
          <h1 class="text-2xl font-bold">Focus crimes from 2003 to 2025</h1>
          <img
            src="yearly_crime_trends.png"
            alt="Yearly crime trends in SF"
            style="max-width: 100%"
          />
        </div>
      </div>
    </main>
  </body>
</html>
