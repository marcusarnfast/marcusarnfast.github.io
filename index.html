    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      @theme {

      }
    </style>
    <style>
      #banana {
        pointer-events: none;
        transform: translate(-50%, -50%) scaleX(1);
      }
      body.cursor-hidden {
        cursor: none;
      }
    </style>
  </head>
  <body>
    <main class="min-h-screen bg-stone-50 font-sans">
      <img
        id="banana"
        src="mouse-walking-1.png"
        alt="Banana Thief"
        class="fixed w-20 top-1/2 left-1/2"
      />

      <script>
        const banana = document.getElementById('banana');
        const WALK_FRAMES = ['mouse-walking-1.png', 'mouse-walking-2.png'];
        const CAUGHT_IMG = 'mouse-catched.png';

        const SPEED = 0.02;
        const DIRECTION_THRESHOLD = 1.5;
        const CATCH_DISTANCE = 40;
        const WALK_INTERVAL_MS = 200;

        let posX = window.innerWidth / 2;
        let posY = window.innerHeight / 2;
        let targetX = posX;
        let targetY = posY;
        let facingRight = true;
        let isCaught = false;
        let walkFrame = 0;
        let lastFrameTime = 0;

        document.addEventListener('mousemove', (e) => {
          targetX = e.clientX;
          targetY = e.clientY;

          // If cursor moves away while caught, resume chasing
          if (isCaught) {
            const dx = targetX - posX;
            const dy = targetY - posY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist > CATCH_DISTANCE * 2) {
              isCaught = false;
              document.body.classList.remove('cursor-hidden');
            }
          }
        });

        function animate(timestamp) {
          const dx = targetX - posX;
          const dy = targetY - posY;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (!isCaught) {
            posX += (targetX - posX) * SPEED;
            posY += (targetY - posY) * SPEED;

            // Flip direction
            if (dx > DIRECTION_THRESHOLD) facingRight = true;
            else if (dx < -DIRECTION_THRESHOLD) facingRight = false;

            // Animate walking frames
            if (timestamp - lastFrameTime > WALK_INTERVAL_MS) {
              walkFrame = (walkFrame + 1) % WALK_FRAMES.length;
              banana.src = WALK_FRAMES[walkFrame];
              lastFrameTime = timestamp;
            }

            // Check if caught
            if (dist < CATCH_DISTANCE) {
              isCaught = true;
              banana.src = CAUGHT_IMG;
              document.body.classList.add('cursor-hidden');
            }
          }

          banana.style.left = `${posX}px`;
          banana.style.top = `${posY}px`;
          banana.style.transform = `translate(-50%, -50%) scaleX(${
            facingRight ? -1 : 1
          })`;

          requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
      </script>
